id: cors-misconfig-pro-fixed

info:
  name: CORS Misconfiguration (Wildcard / Reflection / Credentials)
  author: guigavicentin
  severity: info
  description: Detects insecure CORS configurations including wildcard, origin reflection and credentials enabled.
  tags: cors,misconfig,headers

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Origin: {{cors_origin}}
        User-Agent: nuclei

    payloads:
      cors_origin:

        - "https://{{randstr}}.evil.com"
        - "http://{{randstr}}.evil.com"
        - "null"
        - "https://evil.com"
        - "https://evil.com."
        - "https://evil.com.."
        - "https://evil.com%00"
        - "https://evil.com.{{Hostname}}"
        - "https://{{Hostname}}.evil.com"
        - "https://evil.com@{{Hostname}}"
        - "https://{{Hostname}}@evil.com"

    stop-at-first-match: false

    matchers-condition: or
    matchers:

      # HIGH
      - type: dsl
        name: cors-wildcard-with-credentials-high
        dsl:
          - "contains(tolower(header),'access-control-allow-origin: *') && contains(tolower(header),'access-control-allow-credentials: true')"

      # HIGH
      - type: dsl
        name: cors-reflection-with-credentials-high
        dsl:
          - "contains(tolower(header),tolower(cors_origin)) && contains(tolower(header),'access-control-allow-credentials: true')"

      # MEDIUM
      - type: dsl
        name: cors-origin-reflection-medium
        dsl:
          - "contains(tolower(header),tolower(cors_origin))"

      # LOW
      - type: regex
        name: cors-wildcard-low
        part: header
        regex:
          - "(?i)Access-Control-Allow-Origin:\\s*\\*"

    extractors:
      - type: regex
        part: header
        name: acao
        regex:
          - "(?im)^Access-Control-Allow-Origin\\s*:\\s*(.*)$"

      - type: regex
        part: header
        name: acac
        regex:
          - "(?im)^Access-Control-Allow-Credentials\\s*:\\s*(.*)$"
