id: csrf-heuristic-pro

info:
  name: Potential CSRF Protection Missing (Heuristic)
  author: guigavicentin
  severity: info
  description: Detects POST forms without obvious CSRF token indicators in initial HTML response.
  tags: csrf,misconfig,heuristic,custom

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    headers:
      User-Agent: nuclei

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: header
        regex:
          - "(?i)^Content-Type\\s*:\\s*text/html(?:;|\\s|$)"

      - type: regex
        part: body
        regex:
          - "(?is)<form[^>]*method\\s*=\\s*['\\\"]?post['\\\"]?[^>]*>"

      - type: regex
        part: body
        negative: true
        regex:
          - "(?is)name\\s*=\\s*['\\\"](?:csrf(?:token)?|_csrf|xsrf(?:token)?|authenticity_token|requestverificationtoken|__requestverificationtoken|_token)['\\\"]"
          - "(?is)<meta[^>]+name\\s*=\\s*['\\\"]csrf(?:token)?['\\\"][^>]*content\\s*=\\s*['\\\"][^'\\\"]+['\\\"]"
          - "(?is)<meta[^>]+content\\s*=\\s*['\\\"][^'\\\"]+['\\\"][^>]*name\\s*=\\s*['\\\"]csrf(?:token)?['\\\"]"
          - "(?is)X-CSRF-Token|X-XSRF-Token|CSRF-Token|anti-csrf"

    extractors:
      - type: regex
        part: header
        name: set_cookie_lines
        regex:
          - "(?im)^Set-Cookie\\s*:\\s*(.*)$"

      - type: regex
        part: header
        name: samesite_attrs
        regex:
          - "(?im)^Set-Cookie\\s*:\\s*.*?;\\s*SameSite(?:=|\\s*=\\s*)(Lax|Strict|None).*?$"
